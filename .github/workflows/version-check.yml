# Daily version check for Go and llvm-mingw upstream releases.
# - Detects new MAJOR.MINOR versions (e.g., Go 1.27, LLVM 23.1)
# - Reports new PATCH versions for configured versions (informational)
# - Auto-updates Makefile & .env.example when new major versions arrive
# - Optionally builds and pushes updated images (via workflow_dispatch)
#
# Schedule: every day at 06:00 UTC
# Also triggerable manually via workflow_dispatch.

name: version-check

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      push_images:
        description: "Also build and push updated images"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: write

jobs:
  check:
    name: Check upstream versions
    runs-on: ubuntu-24.04
    outputs:
      go_major_changed: ${{ steps.check-go-major.outputs.changed }}
      go_major_current: ${{ steps.check-go-major.outputs.current }}
      go_major_latest: ${{ steps.check-go-major.outputs.latest }}
      go_resolved: ${{ steps.check-go-patch.outputs.resolved }}
      llvm_major_changed: ${{ steps.check-llvm-major.outputs.changed }}
      llvm_major_current: ${{ steps.check-llvm-major.outputs.current }}
      llvm_major_latest: ${{ steps.check-llvm-major.outputs.latest }}
      llvm_resolved: ${{ steps.check-llvm-patch.outputs.resolved }}
      any_changed: ${{ steps.check-any.outputs.changed }}

    steps:
      - uses: actions/checkout@v4

      # === Read current versions from Makefile ===
      - name: Read current versions from Makefile
        id: read-current
        run: |
          CURRENT_GO=$(sed -n 's/^GO_VERSIONS[[:space:]]*?=[[:space:]]*//p' Makefile)
          CURRENT_LLVM=$(sed -n 's/^LLVM_VERSIONS[[:space:]]*?=[[:space:]]*//p' Makefile)
          echo "CURRENT_GO=$CURRENT_GO" >> $GITHUB_ENV
          echo "CURRENT_LLVM=$CURRENT_LLVM" >> $GITHUB_ENV
          echo "Current Go versions: $CURRENT_GO"
          echo "Current LLVM versions: $CURRENT_LLVM"

      # === Check Go patch (informational, auto-resolved at build time) ===
      - name: Check Go patch versions
        id: check-go-patch
        run: |
          RESOLVED=$(python3 scripts/resolve-go-versions.py ${{ env.CURRENT_GO }} 2>/dev/null || echo "resolve failed")
          echo "resolved=$RESOLVED" >> $GITHUB_OUTPUT
          echo "Resolved Go patches:"
          echo "$RESOLVED"

      # === Check LLVM patch (informational) ===
      - name: Check LLVM-mingw patch versions
        id: check-llvm-patch
        run: |
          RESOLVED=$(python3 scripts/resolve-llvm-versions.py ${{ env.CURRENT_LLVM }} 2>/dev/null || echo "resolve failed")
          echo "resolved=$RESOLVED" >> $GITHUB_OUTPUT
          echo "Resolved LLVM tags:"
          echo "$RESOLVED"

      # === Check Go major versions ===
      - name: Check Go major versions
        id: check-go-major
        run: |
          LATEST_GO=$(python3 scripts/resolve-go-versions.py --list 2>/dev/null || echo "")
          CURRENT_GO="${{ env.CURRENT_GO }}"
          LATEST_GO=$(echo "$LATEST_GO" | tr '\n' ' ' | xargs)
          CURRENT_GO=$(echo "$CURRENT_GO" | xargs)

          if [ -z "$LATEST_GO" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          elif [ "$LATEST_GO" != "$CURRENT_GO" ]; then
            echo "Go major versions changed: $CURRENT_GO -> $LATEST_GO"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "current=$CURRENT_GO" >> $GITHUB_OUTPUT
            echo "latest=$LATEST_GO" >> $GITHUB_OUTPUT
          else
            echo "Go major versions unchanged"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # === Check LLVM major versions ===
      - name: Check LLVM-mingw major versions
        id: check-llvm-major
        run: |
          LATEST_LLVM=$(python3 scripts/resolve-llvm-versions.py --list 2>/dev/null || echo "")
          CURRENT_LLVM="${{ env.CURRENT_LLVM }}"
          LATEST_LLVM=$(echo "$LATEST_LLVM" | tr '\n' ' ' | xargs)
          CURRENT_LLVM=$(echo "$CURRENT_LLVM" | xargs)

          if [ -z "$LATEST_LLVM" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          elif [ "$LATEST_LLVM" != "$CURRENT_LLVM" ]; then
            echo "LLVM major versions changed: $CURRENT_LLVM -> $LATEST_LLVM"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "current=$CURRENT_LLVM" >> $GITHUB_OUTPUT
            echo "latest=$LATEST_LLVM" >> $GITHUB_OUTPUT
          else
            echo "LLVM major versions unchanged"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # === Aggregate ===
      - name: Check if any version changed
        id: check-any
        run: |
          GO_MAJOR="${{ steps.check-go-major.outputs.changed }}"
          LLVM_MAJOR="${{ steps.check-llvm-major.outputs.changed }}"
          if [ "$GO_MAJOR" = "true" ] || [ "$LLVM_MAJOR" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  update:
    name: Create update PR
    needs: check
    if: needs.check.outputs.any_changed == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      # === Update Go major versions ===
      - name: Update Go major versions in Makefile
        if: needs.check.outputs.go_major_changed == 'true'
        run: |
          LATEST="${{ needs.check.outputs.go_major_latest }}"
          sed -i "s/^GO_VERSIONS[[:space:]]*?=.*/GO_VERSIONS    ?= ${LATEST}/" Makefile
          echo "Updated Go major versions in Makefile to: $LATEST"

      # === Update LLVM major versions ===
      - name: Update LLVM major versions in Makefile
        if: needs.check.outputs.llvm_major_changed == 'true'
        run: |
          LATEST="${{ needs.check.outputs.llvm_major_latest }}"
          sed -i "s/^LLVM_VERSIONS[[:space:]]*?=.*/LLVM_VERSIONS  ?= ${LATEST}/" Makefile
          echo "Updated LLVM major versions in Makefile to: $LATEST"

      # === Update .env.example ===
      - name: Update .env.example
        run: |
          if [ "${{ needs.check.outputs.go_major_changed }}" = "true" ]; then
            LATEST_GO="${{ needs.check.outputs.go_major_latest }}"
            sed -i "s/^GO_VERSIONS=.*/GO_VERSIONS=${LATEST_GO}/" .env.example
          fi
          if [ "${{ needs.check.outputs.llvm_major_changed }}" = "true" ]; then
            LATEST_LLVM="${{ needs.check.outputs.llvm_major_latest }}"
            sed -i "s/^LLVM_VERSIONS=.*/LLVM_VERSIONS=${LATEST_LLVM}/" .env.example
          fi
          echo "Updated .env.example with latest versions"

      # === Create PR description ===
      - name: Create PR description
        id: pr-desc
        run: |
          DESC="# Version Update Report\n\n"
          if [ "${{ needs.check.outputs.go_major_changed }}" = "true" ]; then
            DESC="${DESC}## Go Major Version Update\n"
            DESC="${DESC}- Old: \`${{ needs.check.outputs.go_major_current }}\`\n"
            DESC="${DESC}- New: \`${{ needs.check.outputs.go_major_latest }}\`\n\n"
          fi
          if [ "${{ needs.check.outputs.llvm_major_changed }}" = "true" ]; then
            DESC="${DESC}## LLVM-mingw Major Version Update\n"
            DESC="${DESC}- Old: \`${{ needs.check.outputs.llvm_major_current }}\`\n"
            DESC="${DESC}- New: \`${{ needs.check.outputs.llvm_major_latest }}\`\n\n"
          fi
          if [ -n "${{ needs.check.outputs.go_resolved }}" ]; then
            DESC="${DESC}## Go Resolved Patches\n"
            DESC="${DESC}\`\`\`\n${{ needs.check.outputs.go_resolved }}\n\`\`\`\n\n"
          fi
          if [ -n "${{ needs.check.outputs.llvm_resolved }}" ]; then
            DESC="${DESC}## LLVM-mingw Resolved Tags\n"
            DESC="${DESC}\`\`\`\n${{ needs.check.outputs.llvm_resolved }}\n\`\`\`\n\n"
          fi
          DESC="${DESC}---\nAuto-detected by daily version check workflow.\n\n"
          DESC="${DESC}> Patch versions are auto-resolved at build time — no config update needed for those."
          echo "desc=$DESC" >> $GITHUB_OUTPUT

      # === Create Pull Request ===
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: update upstream major versions [skip ci]

            Updates detected by daily version check.
          title: "chore: update upstream major versions detected"
          body: ${{ steps.pr-desc.outputs.desc }}
          branch: "auto/version-update"
          base: main
          labels: automated, version-update
          delete-branch: true

  build:
    name: Build and push images
    needs: check
    if: |
      always() &&
      (needs.check.outputs.any_changed == 'true' || github.event.inputs.push_images == 'true')
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push all images
        run: |
          # If check detected new major versions, use them; otherwise defaults from Makefile
          GO_MAJOR="${{ needs.check.outputs.go_major_latest }}"
          LLVM_MAJOR="${{ needs.check.outputs.llvm_major_latest }}"
          if [ -n "$GO_MAJOR" ] && [ -n "$LLVM_MAJOR" ]; then
            echo "Building with latest versions: Go=$GO_MAJOR LLVM=$LLVM_MAJOR"
            make build-all GO_VERSIONS="$GO_MAJOR" LLVM_VERSIONS="$LLVM_MAJOR"
            make push GO_VERSIONS="$GO_MAJOR" LLVM_VERSIONS="$LLVM_MAJOR"
          else
            echo "Building with default versions from Makefile"
            make build-all
            make push
          fi

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "Go versions: ${{ needs.check.outputs.go_major_latest }}" >> $GITHUB_STEP_SUMMARY
          echo "LLVM versions: ${{ needs.check.outputs.llvm_major_latest }}" >> $GITHUB_STEP_SUMMARY
